<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loverage password reset</title>
  </head>
  <body style="margin:0;background:#fff7f4;font-family:Arial,Helvetica,sans-serif;color:#29151b;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fff7f4;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#fffdfb;border:1px solid #f1d5cc;border-radius:28px;overflow:hidden;box-shadow:0 18px 44px rgba(90,10,30,0.14);">
            <tr>
              <td align="center" style="background:linear-gradient(135deg,#5a0a1e,#9a2946);padding:34px 24px 30px;">
                <img src="https://YOUR_PUBLIC_LOGO_URL/loverage-text.png" width="148" height="auto" alt="Loverage" style="display:block;border:0;outline:none;text-decoration:none;margin:0 auto 18px;">
                <div style="font-size:22px;line-height:1.25;font-weight:700;color:#ffffff;">Reset your password</div>
                <div style="font-size:14px;line-height:1.55;color:rgba(255,255,255,0.78);margin-top:8px;">Use this 4-digit code inside the Loverage app.</div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:34px 26px 12px;">
                <div style="font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#9a2946;margin-bottom:14px;">Your reset code</div>
                <div style="display:inline-block;background:#fff6f2;border:1px solid #efc9bd;border-radius:18px;padding:16px 24px;color:#5a0a1e;font-size:34px;font-weight:800;letter-spacing:0.34em;text-indent:0.34em;line-height:1;">
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 34px 34px;">
                <p style="margin:0;color:#5b4b50;font-size:14px;line-height:1.65;text-align:center;">If you did not request a password reset, you can safely ignore this email. For your security, do not share this code with anyone.</p>
              </td>
            </tr>
          </table>
          <div style="font-size:12px;line-height:1.5;color:#9c7f86;margin-top:18px;">Loverage account security</div>
        </td>
      </tr>
    </table>
  </body>
</html>
